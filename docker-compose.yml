services:

  hmpps-auth:
    image: ghcr.io/ministryofjustice/hmpps-auth:latest
    networks:
      - hmpps
    container_name: hmpps-auth
    ports:
      - "8080:8080"
    healthcheck:
      # The auth image has no curl/wget; bash + /dev/tcp checks the Spring connector is up
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/8080"]
      interval: 15s
      timeout: 3s
      retries: 20
      start_period: 60s
    volumes:
      # Extra flyway migration that seeds the CSRA UI OAuth clients (see local-stack/auth-seed)
      - ./local-stack/auth-seed:/seed:ro
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - APPLICATION_AUTHENTICATION_UI_ALLOWLIST=0.0.0.0/0
      # Append our mounted /seed migration to the default dev (auth-seed profile) flyway locations
      - SPRING_FLYWAY_LOCATIONS=classpath:db/auth,classpath:db/auth_{vendor},classpath:db/dev/data/auth_{vendor},classpath:db/dev/data/auth,filesystem:/seed

  cell-sharing-risk-assessment-api:
    image: ghcr.io/ministryofjustice/hmpps-cell-sharing-risk-assessment-api:latest
    networks:
      - hmpps
    container_name: cell-sharing-risk-assessment-api
    depends_on:
      hmpps-auth:
        condition: service_healthy
      cell-sharing-risk-assessment-db:
        condition: service_healthy
      localstack:
        condition: service_started
    ports:
      - "8090:8080"
    healthcheck:
      # The api image has no curl/wget; bash + /dev/tcp checks the Spring connector is up
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/8080"]
      interval: 15s
      timeout: 3s
      retries: 20
      start_period: 60s
    environment:
      - SERVER_PORT=8080
      - SPRING_PROFILES_ACTIVE=dev
      - HMPPS_AUTH_URL=http://hmpps-auth:8080/auth
      - SPRING_DATASOURCE_URL=jdbc:postgresql://cell-sharing-risk-assessment-db:5432/cell_sharing_risk_assessment?sslmode=prefer
      - HMPPS_SQS_LOCALSTACK_URL=http://localstack:4566
      - CELL_SHARING_RISK_ASSESSMENT_API_CLIENT_ID=hmpps-cell-sharing-risk-assessment-api
      - CELL_SHARING_RISK_ASSESSMENT_API_CLIENT_SECRET=clientsecret

  localstack:
    image: localstack/localstack:stable
    networks:
      - hmpps
    container_name: localstack
    ports:
      - "4566:4566"
      - "8999:8080"
    environment:
      - DEBUG=${DEBUG- }
      - DOCKER_HOST=unix:///var/run/docker.sock
    volumes:
      - "${TMPDIR:-/tmp/localstack}:/var/lib/localstack"
      - "/var/run/docker.sock:/var/run/docker.sock"

  cell-sharing-risk-assessment-db:
    image: postgres:18
    networks:
      - hmpps
    container_name: cell-sharing-risk-assessment-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_PASSWORD=cell_sharing_risk_assessment
      - POSTGRES_USER=cell_sharing_risk_assessment
      - POSTGRES_DB=cell_sharing_risk_assessment
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cell_sharing_risk_assessment"]
      interval: 10s
      timeout: 3s
      retries: 10

  app:
    build:
      context: .
      args:
        BUILD_NUMBER: "1.0.0"
        GIT_REF: "a1b2c3"
        GIT_BRANCH: main
    networks:
      - hmpps
    depends_on:
      hmpps-auth:
        condition: service_healthy
      cell-sharing-risk-assessment-api:
        condition: service_healthy
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:3000/health"]
    environment:
      - PRODUCT_ID=UNASSIGNED
      - REDIS_ENABLED=false
      - REDIS_HOST=localhost
      # External (browser-facing) URL for auth, internal URLs for container-to-container calls
      - HMPPS_AUTH_EXTERNAL_URL=http://localhost:8080/auth
      - HMPPS_AUTH_URL=http://hmpps-auth:8080/auth
      # Clients seeded by local-stack/auth-seed/V901__csra_local_clients.sql
      - AUTH_CODE_CLIENT_ID=hmpps-cell-sharing-risk-assessment-ui
      - AUTH_CODE_CLIENT_SECRET=clientsecret
      - CLIENT_CREDS_CLIENT_ID=hmpps-cell-sharing-risk-assessment-ui-system
      - CLIENT_CREDS_CLIENT_SECRET=clientsecret
      - SESSION_SECRET=somesecretvalue
      - TOKEN_VERIFICATION_API_URL=http://hmpps-auth:8080/auth
      - TOKEN_VERIFICATION_ENABLED=false
      - INGRESS_URL=http://localhost:3000
      - NO_HTTPS=true
      - CSRA_API_URL=http://cell-sharing-risk-assessment-api:8080

networks:
  hmpps:
