services:

  hmpps-auth:
    image: ghcr.io/ministryofjustice/hmpps-auth:latest
    networks:
      - hmpps
    container_name: hmpps-auth
    ports:
      - "8080:8080"
    healthcheck:
      # The auth image has no curl/wget; bash + /dev/tcp checks the Spring connector is up
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/8080"]
      interval: 15s
      timeout: 3s
      retries: 20
      start_period: 60s
    volumes:
      # Extra flyway migration that seeds the CSRA UI OAuth clients (see local-stack/auth-seed)
      - ./local-stack/auth-seed:/seed:ro
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - APPLICATION_AUTHENTICATION_UI_ALLOWLIST=0.0.0.0/0
      # Append our mounted /seed migration to the default dev (auth-seed profile) flyway locations
      - SPRING_FLYWAY_LOCATIONS=classpath:db/auth,classpath:db/auth_{vendor},classpath:db/dev/data/auth_{vendor},classpath:db/dev/data/auth,filesystem:/seed

  cell-sharing-risk-assessment-api:
    image: ghcr.io/ministryofjustice/hmpps-cell-sharing-risk-assessment-api:latest
    networks:
      - hmpps
    container_name: cell-sharing-risk-assessment-api
    depends_on:
      hmpps-auth:
        condition: service_healthy
      cell-sharing-risk-assessment-db:
        condition: service_healthy
      localstack:
        condition: service_healthy
      prisoner-search:
        condition: service_healthy
      prison-api:
        condition: service_healthy
      prison-register:
        condition: service_healthy
    ports:
      - "8090:8080"
    healthcheck:
      # The api image has no curl/wget; bash + /dev/tcp checks the Spring connector is up
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/8080"]
      interval: 15s
      timeout: 3s
      retries: 20
      start_period: 60s
    environment:
      - SERVER_PORT=8080
      - SPRING_PROFILES_ACTIVE=dev
      - HMPPS_AUTH_URL=http://hmpps-auth:8080/auth
      - SPRING_DATASOURCE_URL=jdbc:postgresql://cell-sharing-risk-assessment-db:5432/cell_sharing_risk_assessment?sslmode=prefer
      - HMPPS_SQS_LOCALSTACK_URL=http://localstack:4566
      # The API's own client-credentials registration (application.yml binds system.client.*), used
      # for its calls out to prisoner-search and prison-api. Seeded by local-stack/auth-seed.
      - SYSTEM_CLIENT_ID=hmpps-cell-sharing-risk-assessment-api
      - SYSTEM_CLIENT_SECRET=clientsecret
      # Without these the API falls back to its application-dev.yml localhost defaults, which inside
      # the container are its own loopback, so every downstream call fails.
      - PRISONER_SEARCH_URL=http://prisoner-search:8080
      - PRISON_API_URL=http://prison-api:8080
      - PRISON_REGISTER_URL=http://prison-register:8080

  prisoner-search:
    # WireMock stub for hmpps-prisoner-search; seed data in local-stack/prisoner-search. Serves both
    # the UI (prisoner detail lookups) and the CSRA API (prison roll for the dashboard counts).
    image: wiremock/wiremock:latest
    networks:
      - hmpps
    container_name: prisoner-search
    command: ["--global-response-templating", "--disable-banner"]
    ports:
      - "8083:8080"
    volumes:
      - ./local-stack/prisoner-search:/home/wiremock:ro
    healthcheck:
      # The wiremock image has no curl; bash + /dev/tcp checks the stub server is up
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/8080"]
      interval: 15s
      timeout: 3s
      retries: 10
      start_period: 10s

  prison-api:
    # WireMock stub for prison-api; seed data in local-stack/prison-api. Serves the UI (prisoner
    # photo) and the CSRA API (external movements behind the recent-arrivals worklist).
    image: wiremock/wiremock:latest
    networks:
      - hmpps
    container_name: prison-api
    # NB: no --global-response-templating here. It would also be applied to the binary image
    # response and corrupt the JPEG; the movements stub opts in via its own "transformers".
    command: ["--disable-banner"]
    ports:
      - "8086:8080"
    volumes:
      - ./local-stack/prison-api:/home/wiremock:ro
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/8080"]
      interval: 15s
      timeout: 3s
      retries: 10
      start_period: 10s

  prison-register:
    # WireMock stub for prison-register (prison id -> name reference data); seed data in
    # local-stack/prison-register. Used by the CSRA API for history establishment names.
    image: wiremock/wiremock:latest
    networks:
      - hmpps
    container_name: prison-register
    command: ["--disable-banner"]
    ports:
      - "8087:8080"
    volumes:
      - ./local-stack/prison-register:/home/wiremock:ro
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/8080"]
      interval: 15s
      timeout: 3s
      retries: 10
      start_period: 10s

  manage-users-api:
    # WireMock stub for hmpps-manage-users-api (signed-in user's caseloads); seed data in
    # local-stack/manage-users-api. The seeded caseload (MDI) matches the prisoner-search stub so
    # the prisoner CSRA access guard allows any looked-up prisoner.
    image: wiremock/wiremock:latest
    networks:
      - hmpps
    container_name: manage-users-api
    command: ["--disable-banner"]
    ports:
      - "8084:8080"
    volumes:
      - ./local-stack/manage-users-api:/home/wiremock:ro
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/8080"]
      interval: 15s
      timeout: 3s
      retries: 10
      start_period: 10s

  component-api:
    # WireMock stub for the DPS frontend-components API (shared header/footer); seed data in
    # local-stack/component-api. The UI falls back to a local header/footer if this is unavailable.
    image: wiremock/wiremock:latest
    networks:
      - hmpps
    container_name: component-api
    command: ["--disable-banner"]
    ports:
      - "8085:8080"
    volumes:
      - ./local-stack/component-api:/home/wiremock:ro
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/8080"]
      interval: 15s
      timeout: 3s
      retries: 10
      start_period: 10s

  redis:
    image: redis:8-alpine
    networks:
      - hmpps
    container_name: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  localstack:
    # community-archive, not `stable`: the current LocalStack images are the licensed Pro build and
    # exit on startup without a LOCALSTACK_AUTH_TOKEN, which leaves the API unable to start its SQS
    # listeners. Matches the API repo's own docker-compose.
    image: localstack/localstack:community-archive
    networks:
      - hmpps
    container_name: localstack
    ports:
      - "4566:4566"
      - "8999:8080"
    environment:
      - DEBUG=${DEBUG- }
      - DOCKER_HOST=unix:///var/run/docker.sock
      - SERVICES=sqs,sns
    volumes:
      - "${TMPDIR:-/tmp/localstack}:/var/lib/localstack"
      - "/var/run/docker.sock:/var/run/docker.sock"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  cell-sharing-risk-assessment-db:
    image: postgres:18
    networks:
      - hmpps
    container_name: cell-sharing-risk-assessment-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_PASSWORD=cell_sharing_risk_assessment
      - POSTGRES_USER=cell_sharing_risk_assessment
      - POSTGRES_DB=cell_sharing_risk_assessment
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cell_sharing_risk_assessment"]
      interval: 10s
      timeout: 3s
      retries: 10

  app:
    build:
      context: .
      args:
        BUILD_NUMBER: "1.0.0"
        GIT_REF: "a1b2c3"
        GIT_BRANCH: main
    networks:
      - hmpps
    depends_on:
      hmpps-auth:
        condition: service_healthy
      cell-sharing-risk-assessment-api:
        condition: service_healthy
      prisoner-search:
        condition: service_healthy
      prison-api:
        condition: service_healthy
      manage-users-api:
        condition: service_healthy
      component-api:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3000:3000"
    profiles:
      - include-frontend
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:3000/health"]
    environment:
      - PRODUCT_ID=UNASSIGNED
      - REDIS_ENABLED=true
      - REDIS_HOST=redis
      # External (browser-facing) URL for auth, internal URLs for container-to-container calls
      - HMPPS_AUTH_EXTERNAL_URL=http://localhost:8080/auth
      - HMPPS_AUTH_URL=http://hmpps-auth:8080/auth
      # Clients seeded by local-stack/auth-seed/V901__csra_local_clients.sql
      - AUTH_CODE_CLIENT_ID=hmpps-cell-sharing-risk-assessment-ui
      - AUTH_CODE_CLIENT_SECRET=clientsecret
      - CLIENT_CREDS_CLIENT_ID=hmpps-cell-sharing-risk-assessment-ui-system
      - CLIENT_CREDS_CLIENT_SECRET=clientsecret
      - SESSION_SECRET=somesecretvalue
      - TOKEN_VERIFICATION_API_URL=http://hmpps-auth:8080/auth
      - TOKEN_VERIFICATION_ENABLED=false
      - INGRESS_URL=http://localhost:3000
      - NO_HTTPS=true
      - CSRA_API_URL=http://cell-sharing-risk-assessment-api:8080
      - PRISONER_SEARCH_API_URL=http://prisoner-search:8080
      - PRISON_API_URL=http://prison-api:8080
      - MANAGE_USERS_API_URL=http://manage-users-api:8080
      - COMPONENT_API_URL=http://component-api:8080

networks:
  hmpps:
